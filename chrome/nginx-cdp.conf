map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 19222;

    location / {
        proxy_pass http://127.0.0.1:9222;
        proxy_set_header Host localhost;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Rewrite WebSocket URLs in JSON responses so clients connect back
        # through this proxy instead of directly to localhost:9222
        sub_filter_types application/json;
        sub_filter_once off;
        sub_filter 'ws://localhost/' 'ws://chrome:19222/';
        sub_filter 'ws://localhost:9222/' 'ws://chrome:19222/';
        sub_filter '"localhost"' '"chrome"';
    }
}
