# Shared backend config (DRY)
x-backend-common: &backend-common
  image: ${DOCKER_REGISTRY:-docker.io/}xjh1994/opencli-admin-api:${IMAGE_TAG:-0.1.0}
  env_file:
    - path: .env
      required: false
  volumes:
    - db_data:/data
    - ./backend:/app/backend
  restart: unless-stopped

services:
  # ── Infrastructure (only needed for TASK_EXECUTOR=celery) ─────────────────
  redis:
    profiles: ["celery"]
    image: ${DOCKER_REGISTRY:-}redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: ${DOCKER_REGISTRY:-}postgres:16-alpine
    profiles: ["postgres"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencli_admin}
      POSTGRES_USER: ${POSTGRES_USER:-opencli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opencli_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opencli}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    <<: *backend-common
    # Run as root so the API can manage Docker containers (chrome pool) via
    # the mounted socket. Acceptable for a self-hosted admin panel.
    user: root
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/opencli_admin.db}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # opencli CDP: single-instance fallback
      OPENCLI_CDP_ENDPOINT: ${OPENCLI_CDP_ENDPOINT:-http://chrome-1:19222}
      # Multi-instance pool: overrides OPENCLI_CDP_ENDPOINT when set
      AGENT_POOL_ENDPOINTS: ${AGENT_POOL_ENDPOINTS:-}
      # Collection mode: "local" (direct Docker) or "agent" (distributed edge nodes)
      COLLECTION_MODE: ${COLLECTION_MODE:-local}
      # Passed to the chrome pool manager so it can name containers/networks correctly
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-opencli-admin}
    volumes:
      - db_data:/data
      - ./backend:/app/backend
      # Docker socket: lets the API start/stop Chrome pool containers
      - /var/run/docker.sock:/var/run/docker.sock
      # .env mount: lets the API persist AGENT_POOL_ENDPOINTS after pool changes
      - ./.env:/app/.env:rw
    ports:
      - "${API_PORT:-8031}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Celery Worker (only needed for TASK_EXECUTOR=celery) ─────────────────
  worker:
    profiles: ["celery"]
    <<: *backend-common
    command: celery -A backend.worker.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/opencli_admin.db}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "false"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENCLI_CDP_ENDPOINT: ${OPENCLI_CDP_ENDPOINT:-http://chrome-1:19222}
      AGENT_POOL_ENDPOINTS: ${AGENT_POOL_ENDPOINTS:-}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Celery Beat (only needed for TASK_EXECUTOR=celery) ───────────────────
  beat:
    profiles: ["celery"]
    <<: *backend-common
    command: celery -A backend.worker.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/opencli_admin.db}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "false"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Chrome sidecar (noVNC web UI + persistent profile for opencli) ────────
  # Default single instance — always started.
  chrome-1:
    container_name: chrome-1
    image: ${DOCKER_REGISTRY:-docker.io/}xjh1994/opencli-admin-chrome:${IMAGE_TAG:-0.1.0}
    ports:
      - "${NOVNC_PORT:-3010}:6080"   # noVNC web UI
    volumes:
      - chrome_profile_1:/home/chrome/.config/chromium
    restart: unless-stopped

  # Additional Chrome instances are managed dynamically via the API
  # (浏览器管理 → 新增实例)

  # ── Frontend (nginx + built React) — production ───────────────────────────
  frontend:
    image: ${DOCKER_REGISTRY:-docker.io/}xjh1994/opencli-admin-frontend:${IMAGE_TAG:-0.1.0}
    ports:
      - "${FRONTEND_PORT:-8030}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend dev server (Vite HMR) — run with: docker compose --profile dev up frontend-dev
  frontend-dev:
    profiles: ["dev"]
    image: ${DOCKER_REGISTRY:-}node:22-alpine
    working_dir: /app
    command: sh -c "npm ci --legacy-peer-deps && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-8030}:5173"
    environment:
      VITE_API_PROXY_TARGET: "http://api:8000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  db_data:
  chrome_profile_1:
