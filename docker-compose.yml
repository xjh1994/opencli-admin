# Shared backend config (DRY)
x-backend-common: &backend-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      REGISTRY: ${DOCKER_REGISTRY:-}
  env_file:
    - path: .env
      required: false
  volumes:
    - db_data:/data
    - ./backend:/app/backend
  restart: unless-stopped

services:
  # ── Infrastructure (only needed for TASK_EXECUTOR=celery) ─────────────────
  redis:
    profiles: ["celery"]
    image: ${DOCKER_REGISTRY:-}redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: ${DOCKER_REGISTRY:-}postgres:16-alpine
    profiles: ["postgres"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencli_admin}
      POSTGRES_USER: ${POSTGRES_USER:-opencli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opencli_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opencli}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    <<: *backend-common
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/opencli_admin.db}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # opencli CDP: single-instance fallback
      OPENCLI_CDP_ENDPOINT: ${OPENCLI_CDP_ENDPOINT:-http://chrome:19222}
      # Multi-instance pool: overrides OPENCLI_CDP_ENDPOINT when set
      CHROME_POOL_ENDPOINTS: ${CHROME_POOL_ENDPOINTS:-}
    ports:
      - "${API_PORT:-8031}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Celery Worker (only needed for TASK_EXECUTOR=celery) ─────────────────
  worker:
    profiles: ["celery"]
    <<: *backend-common
    command: celery -A backend.worker.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/opencli_admin.db}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "false"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENCLI_CDP_ENDPOINT: ${OPENCLI_CDP_ENDPOINT:-http://chrome:19222}
      CHROME_POOL_ENDPOINTS: ${CHROME_POOL_ENDPOINTS:-}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Celery Beat (only needed for TASK_EXECUTOR=celery) ───────────────────
  beat:
    profiles: ["celery"]
    <<: *backend-common
    command: celery -A backend.worker.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/opencli_admin.db}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "false"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Chrome sidecar (noVNC web UI + persistent profile for opencli) ────────
  # Default single instance — always started.
  chrome:
    build:
      context: ./chrome
      dockerfile: Dockerfile
      args:
        REGISTRY: ${DOCKER_REGISTRY:-}
    ports:
      - "${NOVNC_PORT:-3010}:6080"   # noVNC web UI
    volumes:
      - chrome_profile:/home/chrome/.config/chromium
    restart: unless-stopped

  # Additional Chrome instances — start with: docker-compose --profile multi-chrome up -d
  # Login to each instance via noVNC: chrome-2 → :3011, chrome-3 → :3012
  # Then set: CHROME_POOL_ENDPOINTS=http://chrome:19222,http://chrome-2:19222,http://chrome-3:19222
  chrome-2:
    profiles: ["multi-chrome"]
    build:
      context: ./chrome
      dockerfile: Dockerfile
      args:
        REGISTRY: ${DOCKER_REGISTRY:-}
    ports:
      - "${NOVNC_PORT_2:-3011}:6080"
    volumes:
      - chrome_profile_2:/home/chrome/.config/chromium
    restart: unless-stopped

  chrome-3:
    profiles: ["multi-chrome"]
    build:
      context: ./chrome
      dockerfile: Dockerfile
      args:
        REGISTRY: ${DOCKER_REGISTRY:-}
    ports:
      - "${NOVNC_PORT_3:-3012}:6080"
    volumes:
      - chrome_profile_3:/home/chrome/.config/chromium
    restart: unless-stopped

  # ── Frontend (nginx + built React) — production ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REGISTRY: ${DOCKER_REGISTRY:-}
    ports:
      - "${FRONTEND_PORT:-8030}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend dev server (Vite HMR) — run with: docker-compose --profile dev up frontend-dev
  frontend-dev:
    profiles: ["dev"]
    image: ${DOCKER_REGISTRY:-}node:22-alpine
    working_dir: /app
    command: sh -c "npm ci --legacy-peer-deps && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-8030}:5173"
    environment:
      VITE_API_PROXY_TARGET: "http://api:8000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  db_data:
  chrome_profile:
  chrome_profile_2:
  chrome_profile_3:
